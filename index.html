<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>CoinStack</title>
    <style>
        :root {
            --bg: #f4f1eb;
            --surface: #ffffff;
            --surface2: #f0ede6;
            --border: #ddd8cc;
            --gold: #9a7b2f;
            --gold-dim: #b8952f;
            --silver: #888;
            --text: #1c1a16;
            --text-dim: #999;
            --danger: #c0392b;
            --danger-confirm: #e03030;
            --radius: 12px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0 0 60px 0;
            overflow-x: hidden;
        }

        header {
            background: var(--surface);
            padding: 20px 16px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        h1 { margin: 0; font-size: 24px; font-weight: 700; color: var(--gold); letter-spacing: -0.5px; }

        .search-container {
            position: relative;
            width: 100%;
        }

        #search-box {
            width: 100%;
            padding: 12px 40px 12px 16px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--surface2);
            font-size: 16px;
            outline: none;
        }

        #search-clear {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 20px;
            display: none;
            cursor: pointer;
        }

        #search-clear.visible { display: block; }

        .gallery {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .coin-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px;
            position: relative;
        }

        .twin-view {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .coin-photo-container {
            flex: 1;
            aspect-ratio: 1/1;
            background: #eee;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        .coin-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .coin-details {
            border-top: 1px solid var(--border);
            padding-top: 8px;
        }

        .coin-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .coin-meta {
            font-size: 11px;
            color: var(--text-dim);
            display: flex;
            justify-content: space-between;
        }

        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
            z-index: 100;
        }

        .nav-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text);
            cursor: pointer;
            padding: 8px 20px;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: var(--surface);
            padding: 24px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 11px; font-weight: 700; color: var(--text-dim); margin-bottom: 4px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; outline: none; }

        .btn-row { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 14px; border: none; border-radius: 12px; font-weight: 600; font-size: 15px; cursor: pointer; }
        .btn-primary { background: var(--gold); color: white; }
        .btn-secondary { background: var(--surface2); color: var(--text); }
        .btn-danger { background: var(--danger); color: white; }

        #toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 13px;
            z-index: 2000;
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <h1>CoinStack</h1>
            <button class="nav-btn" onclick="openModal('settings-modal')">⚙️</button>
        </div>
        <div class="search-container">
            <input type="text" id="search-box" placeholder="Search collection..." oninput="toggleClearBtn(); renderGallery()">
            <span id="search-clear" onclick="clearSearch()">✕</span>
        </div>
    </header>

    <div id="gallery" class="gallery"></div>

    <nav class="nav-bar">
        <button class="nav-btn" onclick="location.reload()">🏠</button>
        <button class="nav-btn" onclick="openModal('add-modal')">⊕</button>
        <button class="nav-btn" onclick="exportData()">💾</button>
    </nav>

    <div id="add-modal" class="modal">
        <div class="modal-content">
            <h3>Add Specimen</h3>
            <div class="form-group">
                <label>Obverse</label>
                <input type="file" id="coin-obverse" accept="image/*" capture="environment">
            </div>
            <div class="form-group">
                <label>Reverse</label>
                <input type="file" id="coin-reverse" accept="image/*" capture="environment">
            </div>
            <div class="form-group">
                <label>Identification</label>
                <input type="text" id="coin-name" placeholder="Name of coin">
            </div>
            <div class="form-group">
                <label>Coin ID</label>
                <input type="text" id="coin-id-val" placeholder="#001">
            </div>
            <div class="btn-row">
                <button class="btn btn-secondary" onclick="closeModal('add-modal')">Cancel</button>
                <button class="btn btn-primary" onclick="saveCoin()">Save</button>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h3>Vault Settings</h3>
            <button class="btn btn-secondary btn-import" style="width: 100%; margin-bottom: 10px;">Import JSON/CSV</button>
            <input type="file" id="import-input" style="display:none;" accept=".json,.csv">
            
            <button class="btn btn-secondary" style="width: 100%; margin-bottom: 20px;" onclick="exportData()">Export Backup</button>
            
            <button class="btn btn-danger" style="width: 100%;" onclick="wipeDatabase()">Wipe Database</button>
            <button class="btn btn-secondary" style="width: 100%; margin-top: 10px;" onclick="closeModal('settings-modal')">Close</button>
        </div>
    </div>

    <div id="toast"></div>

    <script>
    let db;
    const request = indexedDB.open("CoinStackDB", 1);

    request.onupgradeneeded = (e) => {
        db = e.target.result;
        if (!db.objectStoreNames.contains("coins")) {
            db.createObjectStore("coins", { keyPath: "id", autoIncrement: true });
        }
    };

    request.onsuccess = (e) => {
        db = e.target.result;
        renderGallery();
    };

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    async function saveCoin() {
        const name = document.getElementById('coin-name').value;
        const coinID = document.getElementById('coin-id-val').value;
        const obvFile = document.getElementById('coin-obverse').files[0];
        const revFile = document.getElementById('coin-reverse').files[0];

        if (!name) return;

        let obverse = obvFile ? await toBase64(obvFile) : null;
        let reverse = revFile ? await toBase64(revFile) : null;

        const tx = db.transaction("coins", "readwrite");
        tx.objectStore("coins").add({
            name, coinID, obverse, reverse,
            dateAdded: new Date().toLocaleDateString()
        });
        tx.oncomplete = () => {
            location.reload();
        };
    }

    const toBase64 = file => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });

    function renderGallery() {
        const gallery = document.getElementById('gallery');
        const searchTerm = document.getElementById('search-box').value.toLowerCase();
        gallery.innerHTML = '';

        const tx = db.transaction("coins", "readonly");
        tx.objectStore("coins").getAll().onsuccess = (e) => {
            const coins = e.target.result.filter(c => 
                c.name.toLowerCase().includes(searchTerm) || 
                (c.coinID && c.coinID.toLowerCase().includes(searchTerm))
            );

            coins.reverse().forEach(coin => {
                const card = document.createElement('div');
                card.className = 'coin-card';
                card.innerHTML = `
                    <div class=\"twin-view\">
                        <div class=\"coin-photo-container\">
                            <img class=\"coin-img\" src=\"${coin.obverse || ''}\">
                        </div>
                        <div class=\"coin-photo-container\">
                            <img class=\"coin-img\" src=\"${coin.reverse || ''}\">
                        </div>
                    </div>
                    <div class=\"coin-details\">
                        <div class=\"coin-name\">${escHtml(coin.name)}</div>
                        <div class=\"coin-meta\">
                            <span>ID: ${escHtml(coin.coinID || 'N/A')}</span>
                            <span>${coin.dateAdded || ''}</span>
                        </div>
                    </div>
                `;
                gallery.appendChild(card);
            });
        };
    }

    function exportData() {
        const tx = db.transaction("coins", "readonly");
        tx.objectStore("coins").getAll().onsuccess = (e) => {
            const blob = new Blob([JSON.stringify(e.target.result)], { type: "application/json" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `coinstack_backup.json`;
            a.click();
        };
    }

    // --- SURGICAL IMPORT FIX ---
    const importBtn = document.querySelector('.btn-import');
    const importInput = document.getElementById('import-input');

    importBtn.addEventListener('click', () => importInput.click());

    importInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                const coins = JSON.parse(ev.target.result);
                if (confirm(`Replace vault with ${coins.length} coins?`)) {
                    const tx = db.transaction("coins", "readwrite");
                    const store = tx.objectStore("coins");
                    store.clear().onsuccess = () => {
                        const tx2 = db.transaction("coins", "readwrite");
                        coins.forEach(c => { delete c.id; tx2.objectStore("coins").add(c); });
                        tx2.oncomplete = () => location.reload();
                    };
                }
            } catch (err) { alert("Invalid file"); }
        };
        reader.readAsText(file);
    });

    function wipeDatabase() {
        if (confirm("Delete all data?")) {
            const tx = db.transaction("coins", "readwrite");
            tx.objectStore("coins").clear();
            tx.oncomplete = () => location.reload();
        }
    }

    function toggleClearBtn() {
        const val = document.getElementById('search-box').value;
        document.getElementById('search-clear').classList.toggle('visible', val.length > 0);
    }

    function clearSearch() {
        document.getElementById('search-box').value = '';
        toggleClearBtn();
        renderGallery();
    }

    function escHtml(str) {
        return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    </script>
</body>
</html>
