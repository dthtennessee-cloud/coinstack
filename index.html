<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>CoinStack</title>
    <style>
        :root {
            --bg: #f4f1eb;
            --surface: #ffffff;
            --surface2: #f0ede6;
            --border: #ddd8cc;
            --gold: #9a7b2f;
            --gold-dim: #b8952f;
            --silver: #888;
            --text: #1c1a16;
            --text-dim: #999;
            --danger: #c0392b;
            --danger-confirm: #e03030;
            --radius: 12px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0 0 60px 0;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 28px 20px 20px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: #f4f1eb;
            z-index: 10;
        }

        header h1 {
            font-family: Georgia, "Palatino Linotype", Palatino, "Book Antiqua", serif;
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: 4px;
            color: var(--gold);
            margin: 0 0 2px 0;
            text-transform: uppercase;
        }

        header p {
            font-size: 0.7rem;
            color: var(--text-dim);
            letter-spacing: 2px;
            margin: 0;
            text-transform: uppercase;
        }

        main {
            max-width: 540px;
            margin: 0 auto;
            padding: 20px 16px;
        }

        .input-card, .edit-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 28px;
        }

        .section-label {
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--gold-dim);
            margin-bottom: 14px;
            font-weight: 600;
        }

        .coin-slots {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 18px;
        }

        .slot-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            position: relative;
        }

        .slot-label {
            font-size: 0.6rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .slot {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 2px dashed var(--border);
            background: var(--surface2);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
            transition: border-color 0.2s;
            position: relative;
        }

        .slot:active { border-color: var(--gold); }
        .slot.has-image { border-style: solid; border-color: var(--gold-dim); }
        .slot img { width: 100%; height: 100%; object-fit: cover; }

        .slot-clear {
            display: none;
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--danger);
            color: white;
            border: none;
            font-size: 0.65rem;
            font-weight: 700;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            padding: 0;
            line-height: 1;
            z-index: 2;
        }

        .slot-wrapper.has-image .slot-clear { display: flex; }

        .slot-icon { font-size: 1.6rem; opacity: 0.25; }

        .field-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .field-row input { flex: 1; }

        input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            background: #faf8f4;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.95rem;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
            -webkit-appearance: none;
        }

        input[type="text"]::placeholder { color: var(--text-dim); }
        input[type="text"]:focus { border-color: var(--gold-dim); }

        .action-btns {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 13px 20px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: opacity 0.15s, transform 0.1s;
            flex: 1;
        }

        .btn:active { opacity: 0.8; transform: scale(0.98); }

        .btn-save { background: var(--gold); color: #0f0f0f; }
        .btn-export { background: #ffffff; color: var(--text); border: 1px solid var(--border); }
        .btn-import { background: #ffffff; color: var(--gold); border: 1px solid var(--gold-dim); }
        .btn-cancel { background: #ccc; color: #333; }

        .gallery-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .coin-count {
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .coin-count span { color: var(--gold); font-weight: 600; }

        .search-wrap {
            position: relative;
            margin-bottom: 16px;
        }

        .search-wrap input {
            padding-left: 38px;
            padding-right: 36px;
            width: 100%;
        }

        .search-clear {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--text-dim);
            color: var(--bg);
            border: none;
            font-size: 0.65rem;
            font-weight: 700;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .search-clear.visible { display: flex; }

        .search-icon {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.9rem;
            color: var(--text-dim);
            pointer-events: none;
        }

        #gallery {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .coin-card {
            display: flex;
            align-items: center;
            background: var(--surface);
            padding: 12px 14px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            gap: 14px;
            transition: border-color 0.2s;
            position: relative;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            cursor: pointer;
        }

        .coin-card.confirm-delete { border-color: var(--danger); }

        .card-img-wrap { flex-shrink: 0; }

        .card-img {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 1.5px solid var(--gold-dim);
            object-fit: cover;
        }

        .card-img-placeholder {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 1.5px dashed var(--border);
            background: var(--surface2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: var(--silver);
        }

        .card-info { flex: 1; min-width: 0; }

        .card-id {
            font-size: 0.68rem;
            color: var(--gold);
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-date {
            font-size: 0.65rem;
            color: var(--text-dim);
            margin-top: 3px;
        }

        .delete-btn {
            flex-shrink: 0;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .delete-btn.armed {
            background: var(--danger-confirm);
            border-color: var(--danger-confirm);
            color: white;
            font-size: 0.6rem;
            width: auto;
            padding: 0 10px;
            border-radius: 6px;
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-dim);
        }

        .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.4; }

        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1c1a16;
            border: 1px solid #3a3530;
            color: #f0ede6;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.8rem;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            z-index: 100;
            pointer-events: none;
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

<header>
    <h1>CoinStack</h1>
    <p>Pocket Vault</p>
</header>

<main>

    <div id="add-card" class="input-card">
        <div class="section-label">Add New Coin</div>

        <div class="coin-slots">
            <div class="slot-wrapper" id="obv-wrapper">
                <button class="slot-clear" onclick="clearSlot(event, 'obv-slot', 'obv-input', 'obv-wrapper')">✕</button>
                <div class="slot" id="obv-slot" onclick="document.getElementById('obv-input').click()">
                    <span class="slot-icon">🪙</span>
                    <input type="file" id="obv-input" hidden accept="image/*">
                </div>
                <div class="slot-label">Obverse</div>
            </div>
            <div class="slot-wrapper" id="rev-wrapper">
                <button class="slot-clear" onclick="clearSlot(event, 'rev-slot', 'rev-input', 'rev-wrapper')">✕</button>
                <div class="slot" id="rev-slot" onclick="document.getElementById('rev-input').click()">
                    <span class="slot-icon">🪙</span>
                    <input type="file" id="rev-input" hidden accept="image/*">
                </div>
                <div class="slot-label">Reverse</div>
            </div>
        </div>

        <div class="field-row">
            <input type="text" id="coin-id" placeholder="Coin ID (e.g. 0001)">
        </div>
        <div class="field-row">
            <input type="text" id="coin-name" placeholder="Description / Year / Grade">
        </div>

        <div class="action-btns">
            <button class="btn btn-save" onclick="saveCoin()">＋ Add to Vault</button>
            <button class="btn btn-export" onclick="exportVault()">↓ Export</button>
            <button class="btn btn-import">↑ Import</button>
            <input type="file" id="import-input" hidden accept=".json,.csv">
        </div>
    </div>

    <div id="edit-card" class="edit-card" style="display:none;">
        <div class="section-label">Edit Coin</div>

        <div class="coin-slots">
            <div class="slot-wrapper" id="edit-obv-wrapper">
                <button class="slot-clear" onclick="clearSlot(event, 'edit-obv-slot', 'edit-obv-input', 'edit-obv-wrapper')">✕</button>
                <div class="slot" id="edit-obv-slot" onclick="document.getElementById('edit-obv-input').click()">
                    <span class="slot-icon">🪙</span>
                    <input type="file" id="edit-obv-input" hidden accept="image/*">
                </div>
                <div class="slot-label">Obverse</div>
            </div>
            <div class="slot-wrapper" id="edit-rev-wrapper">
                <button class="slot-clear" onclick="clearSlot(event, 'edit-rev-slot', 'edit-rev-input', 'edit-rev-wrapper')">✕</button>
                <div class="slot" id="edit-rev-slot" onclick="document.getElementById('edit-rev-input').click()">
                    <span class="slot-icon">🪙</span>
                    <input type="file" id="edit-rev-input" hidden accept="image/*">
                </div>
                <div class="slot-label">Reverse</div>
            </div>
        </div>

        <div class="field-row">
            <input type="text" id="edit-coin-id" placeholder="Coin ID">
        </div>
        <div class="field-row">
            <input type="text" id="edit-coin-name" placeholder="Description">
        </div>

        <div class="action-btns">
            <button class="btn btn-save" onclick="saveEdit()">Save Changes</button>
            <button class="btn btn-cancel" onclick="cancelEdit()">Cancel</button>
        </div>
    </div>

    <div class="gallery-header">
        <div class="section-label">Vault Gallery</div>
        <div class="coin-count">Total: <span id="coin-total">0</span></div>
    </div>

    <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-box" placeholder="Search by ID or description…" oninput="renderGallery(); toggleClearBtn()">
        <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
    </div>

    <div id="gallery"></div>

</main>

<div id="toast"></div>

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    let db;
    let deleteArmed = null;
    let editingId = null;

    const request = indexedDB.open("CoinStackVault", 2);

    request.onupgradeneeded = (e) => {
        db = e.target.result;
        if (!db.objectStoreNames.contains("coins")) {
            db.createObjectStore("coins", { keyPath: "id", autoIncrement: true });
        }
    };

    request.onsuccess = (e) => {
        db = e.target.result;
        renderGallery();
    };

    request.onerror = () => showToast("⚠️ Storage error");

    function clearSlot(e, slotId, inputId, wrapperId) {
        e.stopPropagation();
        const slot = document.getElementById(slotId);
        slot.innerHTML = `<span class="slot-icon">🪙</span>
            <input type="file" id="${inputId}" hidden accept="image/*">`;
        slot.classList.remove('has-image');
        document.getElementById(wrapperId).classList.remove('has-image');
        setupImagePreview(inputId, slotId, wrapperId);
    }

    function setupImagePreview(inputId, slotId, wrapperId) {
        document.getElementById(inputId).addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const slot = document.getElementById(slotId);
                slot.innerHTML = `<img src="${ev.target.result}" alt="coin">`;
                slot.classList.add('has-image');
                if (wrapperId) document.getElementById(wrapperId).classList.add('has-image');
            };
            reader.readAsDataURL(file);
        });
    }

    setupImagePreview('obv-input', 'obv-slot', 'obv-wrapper');
    setupImagePreview('rev-input', 'rev-slot', 'rev-wrapper');
    setupImagePreview('edit-obv-input', 'edit-obv-slot', 'edit-obv-wrapper');
    setupImagePreview('edit-rev-input', 'edit-rev-slot', 'edit-rev-wrapper');

    function saveCoin() {
        const coinID = document.getElementById('coin-id').value.trim();
        const name   = document.getElementById('coin-name').value.trim();

        if (!coinID && !name) {
            showToast("Please enter a Coin ID or description");
            return;
        }

        const coin = {
            coinID: coinID || "No ID",
            name: name || "Unnamed Coin",
            obverse: document.querySelector('#obv-slot img')?.src || null,
            reverse: document.querySelector('#rev-slot img')?.src || null,
            dateAdded: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
        };

        const tx = db.transaction("coins", "readwrite");
        tx.objectStore("coins").add(coin);
        tx.oncomplete = () => {
            renderGallery();
            resetForm();
            showToast("✓ Coin added");
        };
    }

    function resetForm() {
        document.getElementById('coin-id').value = '';
        document.getElementById('coin-name').value = '';
        ['obv', 'rev'].forEach(side => {
            const slot = document.getElementById(`${side}-slot`);
            slot.innerHTML = `<span class="slot-icon">🪙</span><input type="file" id="${side}-input" hidden accept="image/*">`;
            slot.classList.remove('has-image');
            document.getElementById(`${side}-wrapper`).classList.remove('has-image');
            setupImagePreview(`${side}-input`, `${side}-slot`, `${side}-wrapper`);
        });
    }

    function renderGallery() {
        const gallery = document.getElementById('gallery');
        const searchVal = document.getElementById('search-box').value.trim().toLowerCase();
        gallery.innerHTML = '';
        deleteArmed = null;

        const tx = db.transaction("coins", "readonly");
        const store = tx.objectStore("coins");
        const coins = [];

        store.openCursor(null, 'prev').onsuccess = (e) => {
            const cursor = e.target.result;
            if (cursor) {
                coins.push(cursor.value);
                cursor.continue();
            } else {
                const filtered = searchVal
                    ? coins.filter(c => 
                        c.coinID.toLowerCase().includes(searchVal) ||
                        c.name.toLowerCase().includes(searchVal))
                    : coins;

                document.getElementById('coin-total').textContent = coins.length;

                if (filtered.length === 0) {
                    gallery.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">🏛️</div>
                            <p>${searchVal ? 'No coins match your search.' : 'Your vault is empty.<br>Add or import coins.'}</p>
                        </div>`;
                    return;
                }

                filtered.forEach(data => {
                    const card = document.createElement('div');
                    card.className = 'coin-card';
                    card.dataset.id = data.id;

                    const imgHtml = data.obverse
                        ? `<img class="card-img" src="${data.obverse}" alt="obverse" onerror="this.parentElement.innerHTML='<div class=\'card-img-placeholder\'>🪙</div>'">`
                        : `<div class="card-img-placeholder">🪙</div>`;

                    card.innerHTML = `
                        <div class="card-img-wrap">${imgHtml}</div>
                        <div class="card-info">
                            <div class="card-id">${escHtml(data.coinID)}</div>
                            <div class="card-title">${escHtml(data.name)}</div>
                            <div class="card-date">${data.dateAdded || ''}</div>
                        </div>
                        <button class="delete-btn" data-id="${data.id}" onclick="handleDelete(this, ${data.id}); event.stopPropagation();">✕</button>
                    `;

                    card.addEventListener('click', (e) => {
                        if (!e.target.classList.contains('delete-btn')) {
                            startEdit(data);
                        }
                    });

                    gallery.appendChild(card);
                });
            }
        };
    }

    function startEdit(data) {
        editingId = data.id;

        document.getElementById('edit-coin-id').value = data.coinID || '';
        document.getElementById('edit-coin-name').value = data.name || '';

        ['obv', 'rev'].forEach(side => {
            const slot = document.getElementById(`edit-${side}-slot`);
            const imgSrc = data[side === 'obv' ? 'obverse' : 'reverse'];
            if (imgSrc) {
                slot.innerHTML = `<img src="${imgSrc}" alt="${side}">`;
                slot.classList.add('has-image');
                document.getElementById(`edit-${side}-wrapper`).classList.add('has-image');
            } else {
                slot.innerHTML = `<span class="slot-icon">🪙</span><input type="file" id="edit-${side}-input" hidden accept="image/*">`;
                slot.classList.remove('has-image');
                document.getElementById(`edit-${side}-wrapper`).classList.remove('has-image');
            }
        });

        document.getElementById('add-card').style.display = 'none';
        document.getElementById('edit-card').style.display = 'block';
        window.scrollTo(0, 0);
    }

    function saveEdit() {
        if (!editingId) return;

        const coinID = document.getElementById('edit-coin-id').value.trim();
        const name   = document.getElementById('edit-coin-name').value.trim();

        if (!coinID && !name) {
            showToast("Enter Coin ID or description");
            return;
        }

        const updates = {
            coinID: coinID || "No ID",
            name: name || "Unnamed Coin",
            obverse: document.querySelector('#edit-obv-slot img')?.src || null,
            reverse: document.querySelector('#edit-rev-slot img')?.src || null,
            dateAdded: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
        };

        const tx = db.transaction("coins", "readwrite");
        const store = tx.objectStore("coins");
        const getReq = store.get(editingId);

        getReq.onsuccess = () => {
            const existing = getReq.result || {};
            const updated = { ...existing, ...updates };

            store.put(updated);
            tx.oncomplete = () => {
                renderGallery();
                cancelEdit();
                showToast("✓ Changes saved");
            };
        };
    }

    function cancelEdit() {
        editingId = null;
        document.getElementById('edit-card').style.display = 'none';
        document.getElementById('add-card').style.display = 'block';
    }

    function handleDelete(btn, id) {
        if (deleteArmed === id) {
            const tx = db.transaction("coins", "readwrite");
            tx.objectStore("coins").delete(id);
            tx.oncomplete = () => {
                renderGallery();
                showToast("Coin removed");
            };
        } else {
            if (deleteArmed !== null) {
                const prevBtn = document.querySelector(`.delete-btn[data-id="${deleteArmed}"]`);
                if (prevBtn) prevBtn.textContent = '✕'; prevBtn.classList.remove('armed');
            }

            deleteArmed = id;
            btn.textContent = 'DELETE?';
            btn.classList.add('armed');

            setTimeout(() => {
                if (deleteArmed === id) {
                    btn.textContent = '✕';
                    btn.classList.remove('armed');
                    deleteArmed = null;
                }
            }, 3000);
        }
    }

    document.addEventListener('click', (e) => {
        if (deleteArmed !== null && !e.target.classList.contains('delete-btn')) {
            const prevBtn = document.querySelector(`.delete-btn[data-id="${deleteArmed}"]`);
            if (prevBtn) prevBtn.textContent = '✕'; prevBtn.classList.remove('armed');
            deleteArmed = null;
        }
    });

    function exportVault() {
        const tx = db.transaction("coins", "readonly");
        tx.objectStore("coins").getAll().onsuccess = (e) => {
            const coins = e.target.result;
            if (coins.length === 0) { showToast("Vault empty"); return; }
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(coins, null, 2));
            const dl = document.createElement('a');
            dl.href = dataStr;
            dl.download = `coinstack_${new Date().toISOString().slice(0,10)}.json`;
            dl.click();
            showToast(`✓ Exported ${coins.length} coins`);
        };
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2500);
    }

    let importArmed = false;
    let importCoinsStaged = null;

    const importBtn = document.querySelector('.btn-import');
    importBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        if (importArmed && importCoinsStaged) {
            importArmed = false;
            doReplaceAll(importCoinsStaged);
            importCoinsStaged = null;
        } else {
            document.getElementById('import-input').click();
        }
    });

    document.getElementById('import-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (ev) => {
            let coins = [];

            if (file.name.toLowerCase().endsWith('.json')) {
                try {
                    coins = JSON.parse(ev.target.result);
                } catch {
                    showToast("⚠️ Invalid JSON");
                    return;
                }
            } else if (file.name.toLowerCase().endsWith('.csv')) {
                try {
                    const raw = parseCSV(ev.target.result);
                    coins = raw.map(row => ({
                        coinID: row.CoinID || row.coinID || "No ID",
                        name: [
                            row.Year || row.year || '',
                            (row.Mintmark || row.Mint || row.mintmark || row.MintName || '').charAt(0),
                            row.CoinTypeName || row.CoinType || row.cointypename || ''
                        ].filter(Boolean).join(' ').trim(),
                        obverse: null,
                        reverse: null,
                        dateAdded: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
                    }));
                } catch (err) {
                    showToast("⚠️ CSV error — check columns");
                    console.error(err);
                    return;
                }
            }

            if (!Array.isArray(coins) || coins.length === 0) {
                showToast("⚠️ No coins found");
                return;
            }

            importCoinsStaged = coins;
            importArmed = true;
            showToast(`⚠️ Tap Import again to REPLACE with ${coins.length} coin(s)`);
            setTimeout(() => {
                if (importArmed) {
                    importArmed = false;
                    importCoinsStaged = null;
                    showToast("Import cancelled");
                }
            }, 8000);
        };

        reader.readAsText(file);
        this.value = '';
    });

    function parseCSV(text) {
        const lines = text.trim().split('\n');
        const headers = parseCSVLine(lines[0]);
        const data = [];
        for (let i = 1; i < lines.length; i++) {
            if (!lines[i].trim()) continue;
            const values = parseCSVLine(lines[i]);
            const obj = {};
            headers.forEach((h, j) => { obj[h.trim()] = values[j] ? values[j].trim() : ''; });
            data.push(obj);
        }
        return data;
    }

    function parseCSVLine(line) {
        const result = [];
        let current = '';
        let inQuotes = false;
        for (let char of line + ',') {
            if (char === '"') inQuotes = !inQuotes;
            else if (char === ',' && !inQuotes) {
                result.push(current);
                current = '';
            } else current += char;
        }
        return result;
    }

    function doReplaceAll(coins) {
        const tx = db.transaction("coins", "readwrite");
        tx.objectStore("coins").clear();

            const store = tx2.objectStore("coins");

                store.add(coinData);
