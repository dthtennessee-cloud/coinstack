<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>CoinStack</title>
    <style>
        :root {
            --bg: #f4f1eb;
            --surface: #ffffff;
            --surface2: #f0ede6;
            --border: #ddd8cc;
            --gold: #9a7b2f;
            --gold-dim: #b8952f;
            --silver: #888;
            --text: #1c1a16;
            --text-dim: #999;
            --danger: #c0392b;
            --danger-confirm: #e03030;
            --radius: 12px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0 0 60px 0;
            overflow-x: hidden;
        }

        header {
            background: var(--surface);
            padding: 20px 16px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        h1 { margin: 0; font-size: 24px; font-weight: 700; color: var(--gold); letter-spacing: -0.5px; }

        .search-container {
            position: relative;
            width: 100%;
        }

        #search-box {
            width: 100%;
            padding: 12px 40px 12px 16px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--surface2);
            font-size: 16px;
            outline: none;
        }

        #search-clear {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 20px;
            display: none;
            cursor: pointer;
        }

        #search-clear.visible { display: block; }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            padding: 16px;
        }

        .coin-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            position: relative;
            aspect-ratio: 1/1.3;
            display: flex;
            flex-direction: column;
        }

        .coin-img {
            width: 100%;
            height: 70%;
            object-fit: cover;
            background: #eee;
        }

        .coin-info {
            padding: 8px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .coin-name {
            font-size: 13px;
            font-weight: 600;
            line-height: 1.2;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .coin-id { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
            z-index: 100;
        }

        .nav-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text);
            cursor: pointer;
            padding: 8px 20px;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: var(--surface);
            padding: 24px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 12px; font-weight: 600; color: var(--text-dim); margin-bottom: 4px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; }

        .btn-row { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 14px; border: none; border-radius: 12px; font-weight: 600; font-size: 15px; cursor: pointer; }
        .btn-primary { background: var(--gold); color: white; }
        .btn-secondary { background: var(--surface2); color: var(--text); }
        .btn-danger { background: var(--danger); color: white; }

        #toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 2000;
            display: none;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <h1>CoinStack</h1>
            <button class="nav-btn" onclick="openModal('settings-modal')">⚙️</button>
        </div>
        <div class="search-container">
            <input type="text" id="search-box" placeholder="Search collection..." oninput="toggleClearBtn(); renderGallery()">
            <span id="search-clear" onclick="clearSearch()">✕</span>
        </div>
    </header>

    <div id="gallery" class="gallery"></div>

    <nav class="nav-bar">
        <button class="nav-btn" onclick="location.reload()">🏠</button>
        <button class="nav-btn" onclick="openModal('add-modal')">⊕</button>
        <button class="nav-btn" onclick="exportData()">💾</button>
    </nav>

    <div id="add-modal" class="modal">
        <div class="modal-content">
            <h3>Add New Coin</h3>
            <div class="form-group">
                <label>Photo</label>
                <input type="file" id="coin-photo" accept="image/*" capture="environment">
            </div>
            <div class="form-group">
                <label>Identification / Name</label>
                <input type="text" id="coin-name" placeholder="e.g. 1921 Morgan Dollar">
            </div>
            <div class="form-group">
                <label>Coin ID / Catalog #</label>
                <input type="text" id="coin-id-val" placeholder="e.g. #001">
            </div>
            <div class="btn-row">
                <button class="btn btn-secondary" onclick="closeModal('add-modal')">Cancel</button>
                <button class="btn btn-primary" onclick="saveCoin()">Save Specimen</button>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h3>Vault Management</h3>
            <p style="font-size: 13px; color: var(--text-dim); margin-bottom: 20px;">Backup your collection or import a previous data file (.json or .csv).</p>
            
            <button class="btn btn-secondary btn-import" style="width: 100%; margin-bottom: 10px;">↑ Import Data File</button>
            <input type="file" id="import-input" style="display:none;" accept=".json,.csv">
            
            <button class="btn btn-secondary" style="width: 100%; margin-bottom: 10px;" onclick="exportData()">↓ Export Backup</button>
            
            <div style="margin-top: 30px; border-top: 1px solid var(--border); padding-top: 20px;">
                <button class="btn btn-danger" style="width: 100%;" onclick="wipeDatabase()">Wipe Local Database</button>
            </div>
            
            <button class="btn btn-secondary" style="width: 100%; margin-top: 20px;" onclick="closeModal('settings-modal')">Close</button>
        </div>
    </div>

    <div id="toast"></div>

    <script>
    // --- DATABASE SETUP ---
    let db;
    const request = indexedDB.open("CoinStackDB", 1);

    request.onupgradeneeded = (e) => {
        db = e.target.result;
        if (!db.objectStoreNames.contains("coins")) {
            db.createObjectStore("coins", { keyPath: "id", autoIncrement: true });
        }
    };

    request.onsuccess = (e) => {
        db = e.target.result;
        renderGallery();
    };

    // --- MODAL LOGIC ---
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // --- SAVE LOGIC ---
    async function saveCoin() {
        const name = document.getElementById('coin-name').value;
        const coinID = document.getElementById('coin-id-val').value;
        const photoFile = document.getElementById('coin-photo').files[0];

        if (!name) { showToast("Please enter a name"); return; }

        let photoBase64 = null;
        if (photoFile) {
            photoBase64 = await toBase64(photoFile);
        }

        const newCoin = {
            name,
            coinID,
            obverse: photoBase64,
            dateAdded: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
        };

        const tx = db.transaction("coins", "readwrite");
        tx.objectStore("coins").add(newCoin);
        tx.oncomplete = () => {
            closeModal('add-modal');
            document.getElementById('coin-name').value = '';
            document.getElementById('coin-id-val').value = '';
            document.getElementById('coin-photo').value = '';
            renderGallery();
            showToast("✓ Coin added to vault");
        };
    }

    const toBase64 = file => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });

    // --- GALLERY RENDERING ---
    function renderGallery() {
        const gallery = document.getElementById('gallery');
        const searchTerm = document.getElementById('search-box').value.toLowerCase();
        gallery.innerHTML = '';

        const tx = db.transaction("coins", "readonly");
        const store = tx.objectStore("coins");
        const request = store.getAll();

        request.onsuccess = () => {
            const coins = request.result;
            const filtered = coins.filter(c => 
                c.name.toLowerCase().includes(searchTerm) || 
                (c.coinID && c.coinID.toLowerCase().includes(searchTerm))
            );

            if (filtered.length === 0) {
                gallery.innerHTML = `<div class="empty-state">No specimens found${searchTerm ? ' matching search' : ''}.</div>`;
                return;
            }

            filtered.reverse().forEach(coin => {
                const card = document.createElement('div');
                card.className = 'coin-card';
                card.innerHTML = `
                    <img class="coin-img" src="${coin.obverse || 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII='}">
                    <div class="coin-info">
                        <div class="coin-name">${escHtml(coin.name)}</div>
                        <div class="coin-id">${escHtml(coin.coinID || 'No ID')}</div>
                    </div>
                `;
                gallery.appendChild(card);
            });
        };
    }

    // --- EXPORT / IMPORT LOGIC ---
    function exportData() {
        const tx = db.transaction("coins", "readonly");
        const store = tx.objectStore("coins");
        store.getAll().onsuccess = (e) => {
            const data = JSON.stringify(e.target.result);
            const blob = new Blob([data], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            const date = new Date().toISOString().split('T')[0];
            a.href = url;
            a.download = `coinstack_${date}.json`;
            a.click();
            showToast("✓ Export complete");
        };
    }

    // --- REFINED IMPORT FOR iOS 26.4.1 ---
    const importBtn = document.querySelector('.btn-import');
    const importInput = document.getElementById('import-input');

    if (importBtn) {
        importBtn.addEventListener('click', () => importInput.click());
    }

    if (importInput) {
        importInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (ev) => {
                let coins = [];
                const fileName = file.name.toLowerCase();

                if (fileName.endsWith('.json')) {
                    try {
                        coins = JSON.parse(ev.target.result);
                    } catch {
                        showToast("⚠️ Invalid JSON");
                        return;
                    }
                } else if (fileName.endsWith('.csv')) {
                    try {
                        const raw = parseCSV(ev.target.result);
                        coins = raw.map(row => ({
                            coinID: row.CoinID || row.coinID || "No ID",
                            name: [
                                row.Year || row.year || '',
                                (row.Mintmark || row.Mint || '').charAt(0),
                                row.CoinTypeName || row.CoinType || ''
                            ].filter(Boolean).join(' ').trim(),
                            obverse: null,
                            reverse: null,
                            dateAdded: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
                        }));
                    } catch (err) {
                        showToast("⚠️ CSV error — check columns");
                        return;
                    }
                }

                if (Array.isArray(coins) && coins.length > 0) {
                    // Use native confirm to keep file token active on iOS
                    if (confirm(`REPLACE current vault with ${coins.length} specimens from ${file.name}?`)) {
                        doReplaceAll(coins);
                    }
                } else {
                    showToast("⚠️ No data found in file");
                }
            };

            reader.readAsText(file);
            this.value = ''; // Reset input to allow re-importing the same file
        });
    }

    function parseCSV(str) {
        const lines = str.split('\n');
        const headers = splitCSVLine(lines[0]);
        return lines.slice(1).filter(l => l.trim()).map(line => {
            const values = splitCSVLine(line);
            return headers.reduce((obj, header, i) => {
                obj[header.trim()] = values[i] ? values[i].trim() : '';
                return obj;
            }, {});
        });
    }

    function splitCSVLine(line) {
        const result = [];
        let current = '';
        let inQuotes = false;
        for (let char of line) {
            if (char === '"') inQuotes = !inQuotes;
            else if (char === ',' && !inQuotes) {
                result.push(current);
                current = '';
            } else current += char;
        }
        result.push(current);
        return result;
    }

    function doReplaceAll(coins) {
        const tx = db.transaction("coins", "readwrite");
        const store = tx.objectStore("coins");
        store.clear().onsuccess = () => {
            const tx2 = db.transaction("coins", "readwrite");
            const store2 = tx2.objectStore("coins");
            coins.forEach(coin => {
                // Ensure we don't carry over old 'id' keys to prevent collisions
                const { id, ...coinData } = coin;
                store2.add(coinData);
            });
            tx2.oncomplete = () => {
                renderGallery();
                closeModal('settings-modal');
                showToast(`✓ Vault replaced with ${coins.length} specimen(s)`);
            };
        };
    }

    function wipeDatabase() {
        if (confirm("DANGER: This will permanently delete all local coin data. Proceed?")) {
            const tx = db.transaction("coins", "readwrite");
            tx.objectStore("coins").clear();
            tx.oncomplete = () => {
                renderGallery();
                closeModal('settings-modal');
                showToast("Vault cleared");
            };
        }
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.display = 'block';
        setTimeout(() => { t.style.display = 'none'; }, 3000);
    }

    function toggleClearBtn() {
        const val = document.getElementById('search-box').value;
        document.getElementById('search-clear').classList.toggle('visible', val.length > 0);
    }

    function clearSearch() {
        document.getElementById('search-box').value = '';
        document.getElementById('search-clear').classList.remove('visible');
        renderGallery();
    }

    function escHtml(str) {
        return String(str || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    // Register Service Worker for PWA functionality
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
    </script>
</body>
</html>
