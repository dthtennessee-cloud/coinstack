<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>CoinStack</title>
    <style>
        /* System fonts only — fully offline capable */

        :root {
            --bg: #f4f1eb;
            --surface: #ffffff;
            --surface2: #f0ede6;
            --border: #ddd8cc;
            --gold: #9a7b2f;
            --gold-dim: #b8952f;
            --silver: #888;
            --text: #1c1a16;
            --text-dim: #999;
            --danger: #c0392b;
            --danger-confirm: #e03030;
            --radius: 12px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0 0 60px 0;
            min-height: 100vh;
        }

        /* ── HEADER ── */
        header {
            text-align: center;
            padding: 28px 20px 20px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: #f4f1eb;
            z-index: 10;
        }

        header h1 {
            font-family: Georgia, "Palatino Linotype", Palatino, "Book Antiqua", serif;
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: 4px;
            color: var(--gold);
            margin: 0 0 2px 0;
            text-transform: uppercase;
        }

        header p {
            font-size: 0.7rem;
            color: var(--text-dim);
            letter-spacing: 2px;
            margin: 0;
            text-transform: uppercase;
        }

        /* ── MAIN CONTENT ── */
        main {
            max-width: 540px;
            margin: 0 auto;
            padding: 20px 16px;
        }

        /* ── INPUT CARD ── */
        .input-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 28px;
        }

        .section-label {
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--gold-dim);
            margin-bottom: 14px;
            font-weight: 600;
        }

        /* ── COIN IMAGE SLOTS ── */
        .coin-slots {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 18px;
        }

        .slot-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            position: relative;
        }

        .slot-label {
            font-size: 0.6rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .slot {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 2px dashed var(--border);
            background: var(--surface2);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
            transition: border-color 0.2s;
            position: relative;
        }

        .slot:active { border-color: var(--gold); }
        .slot.has-image { border-style: solid; border-color: var(--gold-dim); }
        .slot img { width: 100%; height: 100%; object-fit: cover; }

        .slot-clear {
            display: none;
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--danger);
            color: white;
            border: none;
            font-size: 0.65rem;
            font-weight: 700;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            padding: 0;
            line-height: 1;
            z-index: 2;
            flex: 0 0 22px !important;
        }

        .slot-wrapper.has-image .slot-clear {
            display: flex;
        }

        .slot-icon {
            font-size: 1.6rem;
            opacity: 0.25;
        }

        /* ── TEXT INPUTS ── */
        .field-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .field-row input { flex: 1; }

        input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            background: #faf8f4;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.95rem;
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            outline: none;
            transition: border-color 0.2s;
            -webkit-appearance: none;
        }

        input[type="text"]::placeholder { color: var(--text-dim); }
        input[type="text"]:focus { border-color: var(--gold-dim); }

        /* ── ACTION BUTTONS ── */
        .action-btns {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 13px 20px;
            border-radius: 8px;
            border: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: opacity 0.15s, transform 0.1s;
            flex: 1;
        }

        .btn:active { opacity: 0.8; transform: scale(0.98); }

        .btn-save {
            background: var(--gold);
            color: #0f0f0f;
        }

        .btn-export {
            background: #ffffff;
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-import {
            background: #ffffff;
            color: var(--gold);
            border: 1px solid var(--gold-dim);
        }

        /* ── GALLERY ── */
        .gallery-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .coin-count {
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .coin-count span {
            color: var(--gold);
            font-weight: 600;
        }

        /* ── SEARCH ── */
        .search-wrap {
            position: relative;
            margin-bottom: 16px;
        }

        .search-wrap input {
            padding-left: 38px;
            width: 100%;
        }

        .search-wrap input {
            padding-right: 36px;
        }

        .search-clear {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--text-dim);
            color: var(--bg);
            border: none;
            font-size: 0.65rem;
            font-weight: 700;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 0;
            line-height: 1;
            flex: 0 0 20px !important;
        }

        .search-clear.visible {
            display: flex;
        }

        .search-icon {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.9rem;
            color: var(--text-dim);
            pointer-events: none;
        }

        #gallery {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* ── COIN CARD ── */
        .coin-card {
            display: flex;
            align-items: center;
            background: var(--surface);
            padding: 12px 14px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            gap: 14px;
            transition: border-color 0.2s;
            position: relative;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }

        .coin-card.confirm-delete {
            border-color: var(--danger);
        }

        .card-img-wrap {
            flex-shrink: 0;
        }

        .card-img {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 1.5px solid var(--gold-dim);
            object-fit: cover;
            display: block;
        }

        .card-img-placeholder {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 1.5px dashed var(--border);
            background: var(--surface2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: var(--silver);
            flex-shrink: 0;
        }

        .card-info {
            flex: 1;
            min-width: 0;
        }

        .card-id {
            font-size: 0.68rem;
            color: var(--gold);
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-date {
            font-size: 0.65rem;
            color: var(--text-dim);
            margin-top: 3px;
        }

        /* ── DELETE BUTTON (fixed) ── */
        .delete-btn {
            flex-shrink: 0;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            font-size: 1rem;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: all 0.15s;
            /* Override any inherited flex/padding from global button styles */
            flex: 0 0 32px !important;
        }

        .delete-btn:hover, .delete-btn:active {
            background: rgba(224, 82, 82, 0.15);
            border-color: var(--danger);
            color: var(--danger);
        }

        .delete-btn.armed {
            background: var(--danger-confirm);
            border-color: var(--danger-confirm);
            color: white;
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            width: auto;
            flex: 0 0 auto !important;
            padding: 0 10px;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
        }

        /* ── EMPTY STATE ── */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-dim);
        }

        .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.4; }
        .empty-state p { font-size: 0.85rem; line-height: 1.6; }

        /* ── TOAST ── */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1c1a16;
            border: 1px solid #3a3530;
            color: #f0ede6;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            z-index: 100;
            pointer-events: none;
            white-space: nowrap;
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

<header>
    <h1>CoinStack</h1>
    <p>Pocket Vault</p>
</header>

<main>

    <!-- INPUT CARD -->
    <div class="input-card">
        <div class="section-label">Add New Coin</div>

        <div class="coin-slots">
            <div class="slot-wrapper" id="obv-wrapper">
                <button class="slot-clear" onclick="clearSlot(event, 'obv-slot', 'obv-input', 'obv-wrapper')">✕</button>
                <div class="slot" id="obv-slot" onclick="document.getElementById('obv-input').click()">
                    <span class="slot-icon">🪙</span>
                    <input type="file" id="obv-input" hidden accept="image/*">
                </div>
                <div class="slot-label">Obverse</div>
            </div>
            <div class="slot-wrapper" id="rev-wrapper">
                <button class="slot-clear" onclick="clearSlot(event, 'rev-slot', 'rev-input', 'rev-wrapper')">✕</button>
                <div class="slot" id="rev-slot" onclick="document.getElementById('rev-input').click()">
                    <span class="slot-icon">🪙</span>
                    <input type="file" id="rev-input" hidden accept="image/*">
                </div>
                <div class="slot-label">Reverse</div>
            </div>
        </div>

        <div class="field-row">
            <input type="text" id="coin-id" placeholder="Coin ID (e.g. MORG-1921)">
        </div>
        <div class="field-row">
            <input type="text" id="coin-name" placeholder="Description / Year / Grade">
        </div>

        <div class="action-btns">
            <button class="btn btn-save" onclick="saveCoin()">＋ Add to Vault</button>
            <button class="btn btn-export" onclick="exportVault()">↓ Export</button>
            <button class="btn btn-import">↑ Import</button>
            <input type="file" id="import-input" hidden accept=".json">
        </div>
    </div>

    <!-- GALLERY SECTION -->
    <div class="gallery-header">
        <div class="section-label" style="margin-bottom:0;">Vault Gallery</div>
        <div class="coin-count">Total: <span id="coin-total">0</span></div>
    </div>

    <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-box" placeholder="Search by ID or description…" oninput="renderGallery(); toggleClearBtn()">
        <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
    </div>

    <div id="gallery"></div>

</main>

<div id="toast"></div>

<script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    let db;
    let deleteArmed = null; // tracks which card has a pending delete

    // ── IndexedDB Init ──
    const request = indexedDB.open("CoinStackVault", 2);

    request.onupgradeneeded = (e) => {
        db = e.target.result;
        if (!db.objectStoreNames.contains("coins")) {
            db.createObjectStore("coins", { keyPath: "id", autoIncrement: true });
        }
    };

    request.onsuccess = (e) => {
        db = e.target.result;
        renderGallery();
    };

    request.onerror = (e) => {
        showToast("⚠️ Storage error — check browser settings");
    };

    // ── Clear individual image slot ──
    function clearSlot(e, slotId, inputId, wrapperId) {
        e.stopPropagation();
        const slot = document.getElementById(slotId);
        slot.innerHTML = `<span class="slot-icon">🪙</span>
            <input type="file" id="${inputId}" hidden accept="image/*">`;
        slot.classList.remove('has-image');
        document.getElementById(wrapperId).classList.remove('has-image');
        setupImagePreview(inputId, slotId, wrapperId);
    }

    // ── Image Preview ──
    function setupImagePreview(inputId, slotId, wrapperId) {
        document.getElementById(inputId).addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const slot = document.getElementById(slotId);
                slot.innerHTML = `<img src="${ev.target.result}" alt="coin">`;
                slot.classList.add('has-image');
                if (wrapperId) document.getElementById(wrapperId).classList.add('has-image');
            };
            reader.readAsDataURL(file);
        });
    }
    setupImagePreview('obv-input', 'obv-slot', 'obv-wrapper');
    setupImagePreview('rev-input', 'rev-slot', 'rev-wrapper');

    // ── Save Coin ──
    function saveCoin() {
        const coinID = document.getElementById('coin-id').value.trim();
        const name   = document.getElementById('coin-name').value.trim();

        if (!coinID && !name) {
            showToast("Please enter a Coin ID or description");
            return;
        }

        const coin = {
            coinID:    coinID || "No ID",
            name:      name   || "Unnamed Coin",
            obverse:   document.querySelector('#obv-slot img')?.src || null,
            reverse:   document.querySelector('#rev-slot img')?.src || null,
            dateAdded: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
        };

        const tx = db.transaction("coins", "readwrite");
        tx.objectStore("coins").add(coin);
        tx.oncomplete = () => {
            renderGallery();
            resetForm();
            showToast("✓ Coin added to vault");
        };
        tx.onerror = () => showToast("⚠️ Save failed");
    }

    function resetForm() {
        document.getElementById('coin-id').value = '';
        document.getElementById('coin-name').value = '';
        const obvSlot = document.getElementById('obv-slot');
        const revSlot = document.getElementById('rev-slot');
        obvSlot.innerHTML = '<span class="slot-icon">🪙</span><input type="file" id="obv-input" hidden accept="image/*">';
        revSlot.innerHTML = '<span class="slot-icon">🪙</span><input type="file" id="rev-input" hidden accept="image/*">';
        obvSlot.classList.remove('has-image');
        revSlot.classList.remove('has-image');
        document.getElementById('obv-wrapper').classList.remove('has-image');
        document.getElementById('rev-wrapper').classList.remove('has-image');
        setupImagePreview('obv-input', 'obv-slot', 'obv-wrapper');
        setupImagePreview('rev-input', 'rev-slot', 'rev-wrapper');
    }

    // ── Render Gallery ──
    function renderGallery() {
        const gallery   = document.getElementById('gallery');
        const searchVal = document.getElementById('search-box').value.trim().toLowerCase();
        gallery.innerHTML = '';
        deleteArmed = null;

        const tx    = db.transaction("coins", "readonly");
        const store = tx.objectStore("coins");
        const coins = [];

        store.openCursor(null, 'prev').onsuccess = (e) => {
            const cursor = e.target.result;
            if (cursor) {
                coins.push(cursor.value);
                cursor.continue();
            } else {
                const filtered = searchVal
                    ? coins.filter(c =>
                        c.coinID.toLowerCase().includes(searchVal) ||
                        c.name.toLowerCase().includes(searchVal))
                    : coins;

                document.getElementById('coin-total').textContent = coins.length;

                if (filtered.length === 0) {
                    gallery.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">🏛️</div>
                            <p>${searchVal ? 'No coins match your search.' : 'Your vault is empty.<br>Add your first coin above.'}</p>
                        </div>`;
                    return;
                }

                filtered.forEach(data => {
                    const card = document.createElement('div');
                    card.className = 'coin-card';
                    card.dataset.id = data.id;

                    const imgHtml = data.obverse
                        ? `<img class="card-img" src="${data.obverse}" alt="obverse" onerror="this.parentElement.innerHTML='<div class=\'card-img-placeholder\'>🪙</div>'">`
                        : `<div class="card-img-placeholder">🪙</div>`;

                    card.innerHTML = `
                        <div class="card-img-wrap">${imgHtml}</div>
                        <div class="card-info">
                            <div class="card-id">${escHtml(data.coinID)}</div>
                            <div class="card-title">${escHtml(data.name)}</div>
                            <div class="card-date">${data.dateAdded || ''}</div>
                        </div>
                        <button class="delete-btn" data-id="${data.id}" onclick="handleDelete(this, ${data.id})">✕</button>
                    `;
                    gallery.appendChild(card);
                });
            }
        };
    }

    // ── Two-tap Delete (no confirm() dialog — works on iOS) ──
    function handleDelete(btn, id) {
        if (deleteArmed === id) {
            // Second tap — actually delete
            const tx = db.transaction("coins", "readwrite");
            tx.objectStore("coins").delete(id);
            tx.oncomplete = () => {
                renderGallery();
                showToast("Coin removed from vault");
            };
        } else {
            // Disarm any previously armed button
            if (deleteArmed !== null) {
                const prevBtn = document.querySelector(`.delete-btn[data-id="${deleteArmed}"]`);
                const prevCard = document.querySelector(`.coin-card[data-id="${deleteArmed}"]`);
                if (prevBtn)  { prevBtn.textContent = '✕'; prevBtn.classList.remove('armed'); }
                if (prevCard) { prevCard.classList.remove('confirm-delete'); }
            }

            // Arm this button — first tap
            deleteArmed = id;
            btn.textContent = 'DELETE?';
            btn.classList.add('armed');
            btn.closest('.coin-card').classList.add('confirm-delete');

            // Auto-disarm after 3 seconds
            setTimeout(() => {
                if (deleteArmed === id) {
                    btn.textContent = '✕';
                    btn.classList.remove('armed');
                    const card = btn.closest('.coin-card');
                    if (card) card.classList.remove('confirm-delete');
                    deleteArmed = null;
                }
            }, 3000);
        }
    }

    // Tap anywhere else to disarm
    document.addEventListener('click', (e) => {
        if (deleteArmed !== null && !e.target.classList.contains('delete-btn')) {
            const prevBtn  = document.querySelector(`.delete-btn[data-id="${deleteArmed}"]`);
            const prevCard = document.querySelector(`.coin-card[data-id="${deleteArmed}"]`);
            if (prevBtn)  { prevBtn.textContent = '✕'; prevBtn.classList.remove('armed'); }
            if (prevCard) { prevCard.classList.remove('confirm-delete'); }
            deleteArmed = null;
        }
    });

    // ── Export ──
    function exportVault() {
        const tx = db.transaction("coins", "readonly");
        tx.objectStore("coins").getAll().onsuccess = (e) => {
            const coins = e.target.result;
            if (coins.length === 0) { showToast("Vault is empty — nothing to export"); return; }
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(coins, null, 2));
            const dl = document.createElement('a');
            dl.setAttribute("href", dataStr);
            dl.setAttribute("download", `coinstack_${new Date().toISOString().slice(0,10)}.json`);
            document.body.appendChild(dl);
            dl.click();
            document.body.removeChild(dl);
            showToast(`✓ Exported ${coins.length} coins`);
        };
    }

    // ── Toast Notification ──
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // ── Import (Replace All) ──
    let importArmed = false;
    let importCoinsStaged = null;

    // Override the Import button click entirely in JS
    const importBtn = document.querySelector('.btn-import');
    importBtn.onclick = null; // remove inline handler
    importBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        if (importArmed && importCoinsStaged) {
            // Second tap — do the replace
            importArmed = false;
            doReplaceAll(importCoinsStaged);
            importCoinsStaged = null;
        } else {
            // First tap — open file picker
            document.getElementById('import-input').click();
        }
    });

    document.getElementById('import-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            let coins;
            try {
                coins = JSON.parse(ev.target.result);
            } catch {
                showToast("⚠️ Invalid file — not a CoinStack JSON");
                return;
            }
            if (!Array.isArray(coins) || coins.length === 0) {
                showToast("⚠️ No coins found in file");
                return;
            }
            // Arm — waiting for second tap
            importCoinsStaged = coins;
            importArmed = true;
            showToast(`⚠️ Tap Import again to REPLACE vault with ${coins.length} coin(s)`);
            setTimeout(() => {
                if (importArmed) {
                    importArmed = false;
                    importCoinsStaged = null;
                    showToast("Import cancelled — timed out");
                }
            }, 5000);
        };
        reader.readAsText(file);
        this.value = '';
    });

    function doReplaceAll(coins) {
        const tx = db.transaction("coins", "readwrite");
        tx.objectStore("coins").clear();
        tx.oncomplete = () => {
            const tx2 = db.transaction("coins", "readwrite");
            const store = tx2.objectStore("coins");
            coins.forEach(coin => {
                const { id, ...coinData } = coin;
                store.add(coinData);
            });
            tx2.oncomplete = () => {
                renderGallery();
                showToast(`✓ Vault replaced with ${coins.length} coin(s)`);
            };
            tx2.onerror = () => showToast("⚠️ Import failed — try again");
        };
    }

    // ── Search Clear Button ──
    function toggleClearBtn() {
        const val = document.getElementById('search-box').value;
        const btn = document.getElementById('search-clear');
        btn.classList.toggle('visible', val.length > 0);
    }

    function clearSearch() {
        document.getElementById('search-box').value = '';
        document.getElementById('search-clear').classList.remove('visible');
        renderGallery();
    }

    // ── Escape HTML ──
    function escHtml(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }
</script>

</body>
</html>
